<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

/* 🔥 BACKGROUND IMAGE */
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: url("{{ url_for('static', filename='login_bg.jpg.jpeg') }}") no-repeat center center/cover;
}

/* 🌫️ DARK OVERLAY */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 0;
}

/* 💎 GLASS LOGIN BOX */
.login-box {
    position: relative;
    z-index: 1;
    width: 320px;
    padding: 30px;
    border-radius: 15px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);

    box-shadow: 0px 10px 40px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
}

/* INPUT */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* ERROR */
.error {
    color: #ff4d4d;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🔐Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
